# /etc/nginx/sites-available/apps.conf
# Reverse proxy config for both applications on one server.
# Routing is based on the Host header (server_name), not port - each
# app's internal port (3001 / 3002) is never exposed publicly, only
# reachable via localhost from Nginx itself. This is what prevents the
# two apps from interfering: they're isolated at the process/port level,
# and the ONLY public entry point is Nginx on 80/443.

upstream todos_api {
    server 127.0.0.1:3001;
}

upstream multi_auth {
    server 127.0.0.1:3002;
}

# ---------- App 1: Todos CRUD API ----------
server {
    listen 80;
    server_name app1.YOUR_SERVER_IP.sslip.io;

    location / {
        proxy_pass http://todos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- App 2: Multi-Auth MERN ----------
server {
    listen 80;
    server_name app2.YOUR_SERVER_IP.sslip.io;

    location / {
        proxy_pass http://multi_auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support in case Multi-Auth uses it for anything
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
